<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EasyBounce Mini</title>
<link rel="stylesheet" href="shared.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:240px;height:90px;overflow:hidden;background:transparent;-webkit-font-smoothing:antialiased;}
body{font-family:-apple-system,'Inter',sans-serif;-webkit-app-region:drag;user-select:none;}
.widget{
  width:240px;height:90px;
  background:rgba(14,14,20,.92);
  border:1px solid rgba(255,255,255,.15);
  border-radius:16px;
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  box-shadow:0 8px 40px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06),inset 0 1px 0 rgba(255,255,255,.1);
  padding:12px 13px 10px;
  display:flex;flex-direction:column;gap:7px;
  position:relative;overflow:hidden;
}
.widget::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(108,99,255,.1) 0%,transparent 60%);
  pointer-events:none;
}
/* expand zone — whole widget minus cancel btn */
.expand-zone{
  position:absolute;inset:0;right:36px;
  cursor:pointer;-webkit-app-region:no-drag;
  z-index:1;
}
.top{display:flex;align-items:center;gap:7px;position:relative;z-index:2;}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:#ffa94d;
  box-shadow:0 0 8px rgba(255,169,77,.7);
  animation:pulse .9s ease-in-out infinite alternate;
  flex-shrink:0;
}
@keyframes pulse{
  from{box-shadow:0 0 4px rgba(255,169,77,.3);opacity:.9;}
  to{box-shadow:0 0 14px rgba(255,169,77,.8),0 0 22px rgba(255,169,77,.3);opacity:1;}
}
.stem-name{
  font-size:12px;font-weight:600;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:#e2e2f0;letter-spacing:-.01em;min-width:0;
}
.counter{
  font-size:10px;color:rgba(255,255,255,.4);
  flex-shrink:0;font-variant-numeric:tabular-nums;
  font-family:'JetBrains Mono','Courier New',monospace;
}
.cancel-btn{
  width:22px;height:22px;border-radius:7px;
  border:1px solid rgba(255,71,87,.35);
  background:rgba(255,71,87,.12);
  color:rgba(255,71,87,.9);
  font-size:11px;font-weight:700;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  -webkit-app-region:no-drag;
  position:relative;z-index:3;
}
.cancel-btn:hover{background:rgba(255,71,87,.28);border-color:rgba(255,71,87,.6);color:#ff4757;}
.bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;position:relative;z-index:2;}
.fill{
  height:100%;
  background:linear-gradient(90deg,#6c63ff,#ff6584);
  border-radius:2px;
  transition:width .5s ease;
  width:0%;
  position:relative;
}
.fill::after{
  content:'';position:absolute;right:0;top:0;height:100%;width:6px;
  background:rgba(255,255,255,.55);
  border-radius:2px;filter:blur(2px);
}
.hint{
  font-size:8px;color:rgba(255,255,255,.22);
  text-align:center;letter-spacing:.04em;
  text-transform:uppercase;position:relative;z-index:2;
}
</style>
</head>
<body>

oke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.2" fill="currentColor" stroke="none"/><circle cx="16" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="8" cy="16" r="1.2" fill="currentColor" stroke="none"/></symbol><symbol id="ico-sliders" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 H20 M4 12 H20 M4 18 H20"/><circle cx="9" cy="6" r="2" fill="#1C1C1A"/><circle cx="15" cy="12" r="2" fill="#1C1C1A"/><circle cx="8" cy="18" r="2" fill="#1C1C1A"/></symbol><symbol id="ico-fader" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3 V21 M13 3 V21 M19 3 V21"/><rect x="4" y="7" width="6" height="4" rx="1" fill="#1C1C1A"/><rect x="10" y="13" width="6" height="4" rx="1" fill="#1C1C1A"/><rect x="16" y="9" width="6" height="4" rx="1" fill="#1C1C1A"/></symbol><symbol id="ico-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L16 14"/></symbol><symbol id="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14 A8 8 0 1 1 10 4 a7 7 0 0 0 10 10 z"/></symbol><symbol id="ico-coffee" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10 H18 V16 A4 4 0 0 1 14 20 H8 A4 4 0 0 1 4 16 Z"/><path d="M18 12 H20 A2 2 0 0 1 22 14 V15 A2 2 0 0 1 20 17 H18"/><path d="M8 3 Q8 5 9 6 M12 3 Q12 5 13 6 M16 3 Q16 5 17 6" opacity="0.6"/></symbol><symbol id="ico-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12 Q7 5 12 5 Q17 5 22 12 Q17 19 12 19 Q7 19 2 12 z"/><circle cx="12" cy="12" r="3"/></symbol><symbol id="ico-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12 Q7 5 12 5 Q17 5 22 12 Q17 19 12 19 Q7 19 2 12 z"/><circle cx="12" cy="12" r="3"/><path d="M3 3 L21 21"/></symbol><symbol id="ico-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10 V7 A4 4 0 0 1 16 7 V10"/></symbol><symbol id="ico-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3 A2.1 2.1 0 0 1 20 6 L8 18 L4 19 L5 15 Z"/></symbol><symbol id="ico-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7 H20 M10 11 V17 M14 11 V17 M5 7 L6 20 A2 2 0 0 0 8 22 H16 A2 2 0 0 0 18 20 L19 7 M9 7 V4 A1 1 0 0 1 10 3 H14 A1 1 0 0 1 15 4 V7"/></symbol><symbol id="ico-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 L15 12 L9 18"/></symbol><symbol id="ico-scan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5" opacity="0.5"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/></symbol><symbol id="ico-headphones" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14 A8 8 0 0 1 20 14"/><rect x="3" y="14" width="5" height="7" rx="1.5"/><rect x="16" y="14" width="5" height="7" rx="1.5"/></symbol><symbol id="ico-rocket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 C16 6 17 11 17 15 L12 18 L7 15 C7 11 8 6 12 2 z"/><circle cx="12" cy="10" r="1.8"/><path d="M9 18 L6 22 M15 18 L18 22"/></symbol></defs></svg>
<div class="widget">
  <!-- invisible expand zone covers left part of widget -->
  <div class="expand-zone" id="expand-zone"></div>
  <div class="top">
    <div class="dot"></div>
    <div class="stem-name" id="stem-name">Bouncing…</div>
    <div class="counter" id="counter">—/—</div>
    <button class="cancel-btn" id="cancel-btn" title="Cancel bounce">✕</button>
  </div>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="hint">click to expand · ✕ to cancel</div>
</div>
<script>
const expandZone = document.getElementById('expand-zone');
const cancelBtn  = document.getElementById('cancel-btn');
const stemName   = document.getElementById('stem-name');
const counter    = document.getElementById('counter');
const fill       = document.getElementById('fill');

expandZone.addEventListener('click', () => {
  if (window.api && window.api.expandFromMini) window.api.expandFromMini();
});

cancelBtn.addEventListener('click', async () => {
  if (window.api && window.api.cancelFromMini) await window.api.cancelFromMini();
});

if (window.api && window.api.onMiniUpdate) {
  window.api.onMiniUpdate((data) => {
    stemName.textContent = data.stemName || '…';
    counter.textContent  = `${data.done}/${data.total}`;
    const pct = data.total > 0 ? Math.round((data.done / data.total) * 100) : 0;
    fill.style.width = pct + '%';
    if (data.accent) {
      fill.style.background = `linear-gradient(90deg,${data.accent},${data.accent2 || '#ff6584'})`;
    }
  });
}
</script>
</body>
</html>
