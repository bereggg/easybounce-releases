<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: -apple-system, 'Space Grotesk', sans-serif;
  -webkit-font-smoothing: antialiased;
}

@keyframes card-appear {
  from { opacity: 0; transform: translateY(-8px) scale(.96); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}
@keyframes card-vanish {
  to   { opacity: 0; transform: translateY(-6px) scale(.95); }
}

.card {
  width: 100%; height: 100%;
  /* Same gradient as mini mode: purple-pink */
  background: linear-gradient(135deg, #6c63ff 0%, #ff6584 100%);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.18);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 14px 0 14px;
  -webkit-app-region: drag;
  user-select: none;
  box-shadow:
    0 8px 32px rgba(108,99,255,.45),
    0 2px 8px rgba(0,0,0,.3),
    inset 0 1px 0 rgba(255,255,255,.2);
  animation: card-appear .28s cubic-bezier(.16,1,.3,1) both;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.08) 0%, transparent 50%);
  border-radius: inherit;
  pointer-events: none;
}
.card.fading {
  animation: card-vanish .22s ease-in forwards;
}

.close-btn {
  position: absolute;
  top: 8px; right: 8px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,.2);
  border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.7);
  font-size: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-app-region: no-drag;
  transition: all .15s;
  line-height: 1;
}
.close-btn:hover { background: rgba(0,0,0,.35); color: #fff; }

/* Top row: dot + stem name + counter */
.top-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 6px;
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,.9);
  box-shadow: 0 0 0 3px rgba(255,255,255,.2);
  flex-shrink: 0;
  animation: dot-pulse 1.2s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(255,255,255,.2); opacity:1; }
  50%      { box-shadow: 0 0 0 2px rgba(255,255,255,.08); opacity:.7; }
}
.stem-name {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.01em;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.counter {
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,.75);
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  flex-shrink: 0;
}

/* Progress bar */
.prog-bar {
  height: 3px;
  background: rgba(0,0,0,.2);
  border-radius: 2px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: rgba(255,255,255,.9);
  border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
  width: 0%;
}
</style>
</head>
<body>
<div class="card" id="card">
  <button class="close-btn" id="close-btn" title="Dismiss">✕</button>
  <div class="top-row">
    <div class="pulse-dot"></div>
    <div class="stem-name" id="stem-name">Bouncing…</div>
    <div class="counter" id="counter"></div>
  </div>
  <div class="prog-bar">
    <div class="prog-fill" id="prog-fill"></div>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron');
const card     = document.getElementById('card');
const closeBtn = document.getElementById('close-btn');

function _fadeOut(cb) {
  card.classList.add('fading');
  setTimeout(cb, 230);
}

closeBtn.addEventListener('click', () => {
  _fadeOut(() => ipcRenderer.invoke('overlay-dismiss'));
});

ipcRenderer.on('overlay-update', (_, data) => {
  const name    = document.getElementById('stem-name');
  const counter = document.getElementById('counter');
  const fill    = document.getElementById('prog-fill');
  if (name && data.name)  name.textContent = data.name;
  if (counter && data.total > 0) counter.textContent = (data.done + 1) + '/' + data.total;
  if (fill    && data.total > 0) fill.style.width = Math.min(100, Math.round((data.done / data.total) * 100)) + '%';
});

ipcRenderer.on('overlay-fade-out', () => {
  _fadeOut(() => {});
});
</script>
</body>
</html>
