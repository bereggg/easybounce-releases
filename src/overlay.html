<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:transparent; -webkit-font-smoothing:antialiased; }

@keyframes appear { from { opacity:0; transform:translateY(-8px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes vanish { to { opacity:0; transform:translateY(-6px) scale(.95); } }
@keyframes pulse-dot { from { box-shadow:0 0 4px rgba(255,169,77,.3); opacity:.8; } to { box-shadow:0 0 14px rgba(255,169,77,.9); opacity:1; } }

.card {
  width:100%; height:100%;
  background: rgba(14,14,22,.95);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04), inset 0 1px 0 rgba(255,255,255,.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 22px 20px 18px;
  text-align: center;
  -webkit-app-region: drag;
  user-select: none;
  animation: appear .28s cubic-bezier(.16,1,.3,1) both;
  position: relative;
  overflow: hidden;
  font-family: 'Syne', -apple-system, sans-serif;
}
.card::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 0%, rgba(108,99,255,.09) 0%, transparent 65%);
  pointer-events:none;
}
.card.fading { animation: vanish .22s ease-in forwards; }

.close-btn {
  position:absolute; top:11px; right:11px;
  width:24px; height:24px; border-radius:8px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.09);
  color: rgba(255,255,255,.35);
  font-size:11px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  -webkit-app-region: no-drag;
  transition: all .15s;
}
.close-btn:hover { background:rgba(255,255,255,.1); color:#fff; border-color:rgba(255,255,255,.18); }

.icon {
  width:44px; height:44px; border-radius:13px;
  background: linear-gradient(135deg, rgba(108,99,255,.18), rgba(255,101,132,.12));
  border: 1px solid rgba(108,99,255,.22);
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  margin-bottom:12px;
  box-shadow: 0 4px 18px rgba(108,99,255,.22);
  position:relative; z-index:1;
}

.title {
  font-size:15px; font-weight:900;
  color:#fff; letter-spacing:-.02em;
  margin-bottom:7px;
  position:relative; z-index:1;
}

.status {
  display:flex; align-items:center; gap:7px;
  font-family:'DM Mono', monospace;
  font-size:10px; color:#ffa94d;
  margin-bottom:10px;
  position:relative; z-index:1;
}
.status-dot {
  width:6px; height:6px; border-radius:50%;
  background:#ffa94d;
  box-shadow: 0 0 8px rgba(255,169,77,.6);
  animation: pulse-dot .9s ease-in-out infinite alternate;
  flex-shrink:0;
}
.status-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }

.subtitle {
  font-size:11px; color:#8888a8; line-height:1.6;
  margin-bottom:13px; max-width:240px;
  position:relative; z-index:1;
}
.subtitle strong { color:#e8e6f0; font-weight:700; }

.divider { width:100%; height:1px; background:rgba(255,255,255,.06); margin-bottom:11px; position:relative; z-index:1; }

.tip {
  display:flex; align-items:center; gap:9px;
  background: rgba(108,99,255,.06);
  border: 1px solid rgba(108,99,255,.12);
  border-radius:11px; padding:9px 13px;
  width:100%; text-align:left;
  position:relative; z-index:1;
}
.tip-icon { font-size:16px; flex-shrink:0; }
.tip-text { font-size:10px; color:#8888a8; line-height:1.55; }
.tip-text strong { color:#a89fff; font-weight:700; }
</style>
</head>
<body>
<div class="card" id="card">
  <button class="close-btn" id="close-btn">✕</button>
  <div class="icon">⚡</div>
  <div class="title">Bouncing in progress</div>
  <div class="status">
    <div class="status-dot"></div>
    <span class="status-text" id="status-text">Starting…</span>
  </div>
  <div class="subtitle"><strong style="color:#e03c3c;">Don't touch your Mac</strong> — EasyBounce is handling everything.</div>
  <div class="divider"></div>
  <div class="tip">
    <span class="tip-icon">☕</span>
    <span class="tip-text"><strong>Grab a coffee.</strong> We'll notify you when the bounce is done.</span>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron');
const card = document.getElementById('card');
const closeBtn = document.getElementById('close-btn');

function _fadeOut(cb) {
  card.classList.add('fading');
  setTimeout(cb, 230);
}

closeBtn.addEventListener('click', () => {
  _fadeOut(() => ipcRenderer.invoke('overlay-dismiss'));
});

ipcRenderer.on('overlay-update', (_, data) => {
  const st = document.getElementById('status-text');
  if (st) {
    const name = data.name || '…';
    const count = data.total > 0 ? ` — ${data.done + 1} / ${data.total}` : '';
    st.textContent = name + count;
  }
});

ipcRenderer.on('overlay-fade-out', () => {
  _fadeOut(() => {});
});
</script>
</body>
</html>
