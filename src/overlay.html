<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: -apple-system, 'Space Grotesk', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.card {
  width: 100%; height: 100%;
  background: rgba(10, 8, 20, 0.78);
  backdrop-filter: blur(32px) saturate(200%);
  -webkit-backdrop-filter: blur(32px) saturate(200%);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.13);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 26px 28px 22px;
  -webkit-app-region: drag;
  user-select: none;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.05) inset,
    0 30px 80px rgba(0,0,0,.6),
    0 0 60px rgba(108,99,255,.08);
}

/* thin gradient top line */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), rgba(108,99,255,.3), rgba(255,255,255,.25), transparent);
  border-radius: 999px;
}

.close-btn {
  position: absolute;
  top: 11px; right: 12px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.45);
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-app-region: no-drag;
  transition: all .15s;
  line-height: 1;
}
.close-btn:hover { background: rgba(255,71,87,.22); color: #ff4757; border-color: rgba(255,71,87,.45); }

.icon-wrap {
  position: relative;
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 2px;
}
.icon-glow {
  position: absolute;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,160,0,.45) 0%, rgba(255,100,0,.15) 50%, transparent 70%);
  animation: glow-pulse 2s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.25); opacity: .7; }
}
.icon { font-size: 34px; position: relative; z-index: 1; }

.title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -.025em;
  background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,.75) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
}

.progress-row {
  display: flex; align-items: center; gap: 8px;
  min-height: 20px;
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #ff9f0a;
  box-shadow: 0 0 0 3px rgba(255,159,10,.2), 0 0 10px rgba(255,159,10,.5);
  animation: dot-pulse 1.3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes dot-pulse {
  0%,100% { opacity:1; transform:scale(1); box-shadow:0 0 0 3px rgba(255,159,10,.2),0 0 10px rgba(255,159,10,.5); }
  50%     { opacity:.55; transform:scale(.8); box-shadow:0 0 0 2px rgba(255,159,10,.1),0 0 4px rgba(255,159,10,.2); }
}
.prog-text {
  font-size: 12px;
  font-weight: 700;
  color: #ffaa30;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  letter-spacing: .02em;
}

.prog-bar-wrap {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,.08);
  border-radius: 2px;
  overflow: hidden;
}
.prog-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff9f0a, #ffd60a, #ff9f0a);
  background-size: 200% 100%;
  border-radius: 2px;
  transition: width .7s cubic-bezier(.4,0,.2,1);
  animation: bar-shimmer 2s linear infinite;
}
@keyframes bar-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.subtitle {
  font-size: 11.5px;
  color: rgba(255,255,255,.48);
  text-align: center;
  line-height: 1.55;
  max-width: 300px;
}

.tip-block {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 11px;
  font-size: 11px;
  color: rgba(255,255,255,.38);
  width: 100%;
  margin-top: 2px;
}
.tip-icon { font-size: 15px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <button class="close-btn" id="close-btn" title="Dismiss — bounce continues">✕</button>

  <div class="icon-wrap">
    <div class="icon-glow"></div>
    <div class="icon">⚡</div>
  </div>

  <div class="title">Bouncing in progress</div>

  <div class="progress-row">
    <div class="pulse-dot"></div>
    <div class="prog-text" id="prog-text">Starting…</div>
  </div>

  <div class="prog-bar-wrap">
    <div class="prog-bar-fill" id="prog-fill" style="width:0%"></div>
  </div>

  <div class="subtitle">Don't touch your Mac —<br>EasyBounce is handling everything</div>

  <div class="tip-block">
    <span class="tip-icon">☕</span>
    <span>Grab a coffee. We'll finish while you're away.</span>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron');

document.getElementById('close-btn').addEventListener('click', () => {
  ipcRenderer.invoke('overlay-dismiss');
});

ipcRenderer.on('overlay-update', (_, data) => {
  const text  = document.getElementById('prog-text');
  const fill  = document.getElementById('prog-fill');
  if (text) {
    if (data.name && data.total > 0) {
      text.textContent = data.name + ' — ' + (data.done + 1) + ' / ' + data.total;
    } else if (data.name) {
      text.textContent = data.name;
    }
  }
  if (fill && data.total > 0) {
    fill.style.width = Math.min(100, Math.round((data.done / data.total) * 100)) + '%';
  }
});
</script>
</body>
</html>
