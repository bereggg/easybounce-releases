<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EasyBounce — Activate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;}
body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(ellipse at 35% 40%, #0f0d22 0%, #09090f 100%);
  color:#e2e2f0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
  -webkit-app-region:drag;
  overflow:hidden;
}
.drag-bar{position:fixed;top:0;left:0;right:0;height:52px;-webkit-app-region:drag;}
.wrap{
  width:380px;
  text-align:center;
  -webkit-app-region:drag;
}
.logo{
  width:68px;height:68px;border-radius:20px;
  background:linear-gradient(135deg,#6c63ff,#ff6584);
  margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 40px rgba(108,99,255,.45);
}
.logo svg{width:34px;height:34px;fill:white;}
h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;}
.sub{font-size:13px;color:#555;margin-bottom:32px;line-height:1.6;}
input{
  width:100%;background:#0e0e14;border:1px solid #252530;border-radius:12px;
  color:#e2e2f0;font-size:14px;
  padding:13px 16px;text-align:center;
  outline:none;transition:border-color .2s;margin-bottom:8px;
}
input:focus{border-color:rgba(108,99,255,.55);}
input#key-input{font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;}
input#email-input{font-family:'Inter',sans-serif;}
input::placeholder{color:#333;letter-spacing:.02em;text-transform:none;}
.err{font-size:11px;color:#ff4757;min-height:18px;margin-bottom:12px;}
.btn{
  width:100%;height:50px;border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#6c63ff,#ff6584);color:white;
  font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:.03em;transition:all .18s;
  box-shadow:0 6px 24px rgba(108,99,255,.4),inset 0 1px 0 rgba(255,255,255,.2);
  margin-bottom:12px;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(108,99,255,.55);}
.btn:disabled{background:#1c1c24;color:#444;box-shadow:none;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:12px;margin:4px 0 16px;color:#2a2a38;font-size:11px;letter-spacing:.06em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1e1e28;}
.email-hint{font-size:11px;color:#2e2e3e;margin-bottom:14px;margin-top:-4px;}
.trial-btn{
  width:100%;height:48px;border-radius:14px;
  border:1px solid rgba(99,255,180,.25);cursor:pointer;
  background:rgba(99,255,180,.06);color:#63ffb4;
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:.02em;transition:all .18s;margin-bottom:18px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.trial-btn:hover{background:rgba(99,255,180,.12);border-color:rgba(99,255,180,.4);}
.trial-btn:disabled{opacity:.4;cursor:not-allowed;}
.trial-badge{
  display:flex;align-items:center;gap:8px;
  background:rgba(99,255,180,.07);border:1px solid rgba(99,255,180,.2);
  border-radius:12px;padding:11px 16px;margin-bottom:16px;
  font-size:12px;color:#63ffb4;font-weight:500;width:100%;
}
.trial-badge.expired{background:rgba(255,71,87,.06);border-color:rgba(255,71,87,.2);color:#ff4757;}
.offline-badge{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,150,0,.06);border:1px solid rgba(255,150,0,.2);
  border-radius:12px;padding:11px 14px;margin-bottom:16px;width:100%;
}
.offline-text{display:flex;flex-direction:column;gap:2px;text-align:left;flex:1;font-size:11px;}
.offline-text strong{color:#ffa040;font-weight:600;}
.offline-text span{color:#555;}
.offline-retry{
  flex-shrink:0;background:rgba(255,150,0,.1);border:1px solid rgba(255,150,0,.3);
  border-radius:8px;color:#ffa040;font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:600;padding:5px 11px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.offline-retry:hover{background:rgba(255,150,0,.2);}
.buy{font-size:12px;color:#333;margin-bottom:16px;}
.buy a{color:#6c63ff;text-decoration:none;}
.buy a:hover{text-decoration:underline;}
.machine{padding-top:16px;border-top:1px solid #141420;font-family:'JetBrains Mono',monospace;font-size:9px;color:#222230;}
input,.btn,.trial-btn,.offline-retry,a{-webkit-app-region:no-drag;}
</style>
</head>
<body>
<div class="drag-bar"></div>
<div class="wrap">
  <div class="logo"><svg viewBox="0 0 48 48" fill="none"><path d="M4 24 L10 24 L14 12 L19 36 L23 16 L27 32 L31 20 L35 24 L44 24" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <h1>EasyBounce</h1>
  <p class="sub" id="subtitle">Enter your license key to activate.<br>Or start your free 7-day trial.</p>

  <!-- Trial section — shown dynamically -->
  <div id="trial-section"></div>

  <!-- Divider before key input -->
  <div class="divider">or</div>

  <input type="text" id="key-input" placeholder="EB-XXXX-XXXX-XXXX"
    oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')"
    onkeydown="if(event.key==='Enter')activate()">
  <div class="err" id="err"></div>
  <button class="btn" id="btn" onclick="activate()">Activate EasyBounce</button>
  <div class="buy">Don't have a key? <a href="#" onclick="window.api&&window.api.openExternal&&window.api.openExternal('https://easyoneaudio.com');return false;">Purchase at easyoneaudio.com →</a></div>
  <div class="machine">Machine ID: <span id="mid">—</span></div>
</div>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  if (window.api && window.api.getMachineId) {
    const id = await window.api.getMachineId();
    document.getElementById('mid').textContent = id;
  }
  if (window.api && window.api.getTrialInfo) {
    try {
      const trial = await window.api.getTrialInfo();
      renderTrial(trial);
    } catch(e) { renderTrial({ started: false, active: false, expired: false }); }
  }
});

function renderTrial(trial) {
  const sec = document.getElementById('trial-section');
  if (trial.offline) {
    renderTrialOffline();
  } else if (!trial.started) {
    sec.innerHTML = `
      <input type="email" id="email-input" placeholder="your@email.com" style="margin-bottom:6px;">
      <div class="email-hint">Same email you used to download</div>
      <button class="trial-btn" id="trial-btn" onclick="startTrial()">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="#63ffb4"><polygon points="3,1 13,7 3,13"/></svg>
        Start Free Trial — 7 days
      </button>`;
  } else if (trial.active) {
    const days = trial.daysRemaining;
    sec.innerHTML = `
      <div class="trial-badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#63ffb4" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L16 14"/></svg>
        Trial active — ${days} day${days !== 1 ? 's' : ''} remaining
        <button onclick="continueTrial()" style="margin-left:auto;background:rgba(99,255,180,.15);border:1px solid rgba(99,255,180,.3);border-radius:8px;color:#63ffb4;font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;">Continue →</button>
      </div>`;
  } else {
    sec.innerHTML = `
      <div class="trial-badge expired">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round"><path d="M6 6L18 18M18 6L6 18"/></svg>
        Trial expired — purchase to continue
      </div>`;
  }
}

function renderTrialOffline() {
  const sec = document.getElementById('trial-section');
  sec.innerHTML = `
    <div class="offline-badge">
      <div class="offline-text">
        <strong>No internet connection</strong>
        <span>Connect to start your trial or activate a key</span>
      </div>
      <button class="offline-retry" onclick="retryConnection()">↻ Retry</button>
    </div>`;
}

async function retryConnection() {
  const sec = document.getElementById('trial-section');
  sec.innerHTML = `<div style="font-size:12px;color:#555;margin-bottom:16px;">Checking connection…</div>`;
  try {
    const trial = await window.api.getTrialInfo();
    renderTrial(trial);
  } catch(e) { renderTrialOffline(); }
}

async function startTrial() {
  const trialBtn = document.getElementById('trial-btn');
  const emailInput = document.getElementById('email-input');
  const email = emailInput ? emailInput.value.trim() : '';
  if (trialBtn) { trialBtn.disabled = true; trialBtn.innerHTML = 'Starting…'; }
  try {
    const trial = await window.api.activateTrial(email);
    const sec = document.getElementById('trial-section');
    if (trial.ok && trial.active) {
      sec.innerHTML = `<div class="trial-badge">✓ Trial started! Opening EasyBounce…</div>`;
    } else if (trial.expired) {
      sec.innerHTML = `<div class="trial-badge expired">✕ Trial expired — <a href="#" onclick="window.api&&window.api.openExternal&&window.api.openExternal('https://easyoneaudio.com')" style="color:#6c63ff;font-size:11px;">Buy at easybounce.app →</a></div>`;
    } else if (trial.offline) {
      renderTrialOffline();
    } else {
      const err = document.getElementById('err');
      err.textContent = trial.reason || 'Could not start trial. Try again.';
      if (trialBtn) { trialBtn.disabled = false; trialBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 14 14" fill="#63ffb4"><polygon points="3,1 13,7 3,13"/></svg> Start Free Trial — 7 days'; }
    }
  } catch(e) {
    if (trialBtn) { trialBtn.disabled = false; trialBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 14 14" fill="#63ffb4"><polygon points="3,1 13,7 3,13"/></svg> Start Free Trial — 7 days'; }
  }
}

async function continueTrial() {
  try {
    const trial = await window.api.activateTrial('');
    if (trial.ok && trial.active) {
      const sec = document.getElementById('trial-section');
      sec.innerHTML = `<div class="trial-badge">✓ Opening EasyBounce…</div>`;
    }
  } catch(e) {}
}

async function activate() {
  const key = document.getElementById('key-input').value.trim();
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  if (!key) { err.textContent = 'Please enter your license key'; return; }
  btn.disabled = true;
  btn.textContent = 'Activating…';
  err.textContent = '';
  try {
    const result = await window.api.activateAndLaunch(key);
    if (result && result.ok) {
      btn.style.background = 'linear-gradient(135deg,#43e97b,#38f9d7)';
      btn.textContent = '✓ Activated! Launching…';
      err.style.color = '#43e97b';
      err.textContent = 'Welcome to EasyBounce!';
    } else {
      btn.disabled = false;
      btn.textContent = 'Activate EasyBounce';
      err.textContent = (result && result.reason) || 'Invalid license key';
      document.getElementById('key-input').style.borderColor = '#ff4757';
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Activate EasyBounce';
    err.textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
